<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Caleb Record</title>
    <style>
      html, body { margin: 0; width: 616px; height: 220px; overflow: hidden; background: #fff; font-family: Arial, Helvetica, sans-serif; }
      .card {
        width: 616px;
        height: 220px;
        box-sizing: border-box;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: #f8fafc;
        padding: 28px;
        color: #1e293b;
      }
      .eyebrow {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #c83803;
      }
      .col {
        display: inline-block;
        width: 49%;
        vertical-align: top;
        box-sizing: border-box;
      }
      .col.right {
        padding-left: 28px;
        border-left: 1px solid #cbd5e1;
      }
      .label {
        margin: 0;
        font-size: 13px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
      }
      .value {
        margin: 10px 0 0;
        font-size: 58px;
        line-height: 1;
        font-weight: 900;
        color: #0b162a;
      }
      .value.orange { color: #c83803; }
      .unit {
        margin: 6px 0 0;
        font-size: 16px;
        color: #475569;
      }
      .note {
        margin: 12px 0 0;
        font-size: 12px;
        line-height: 1.5;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="card" data-export-root>
      <p class="eyebrow">Caleb vs. The Record</p>
      <div style="margin-top: 24px;">
        <div class="col">
          <p class="label">Erik Kramer (1995)</p>
          <p class="value">3,838</p>
          <p class="unit">yards</p>
          <p class="note">Set in a 16-game season</p>
        </div>
        <div class="col right">
          <p class="label">Caleb Williams (2025)</p>
          <p class="value orange">3,942</p>
          <p class="unit">yards</p>
        </div>
      </div>
    </div>
  </body>
</html>
