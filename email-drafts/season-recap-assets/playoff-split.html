<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Playoff Split</title>
    <style>
      html, body { margin: 0; width: 616px; height: 382px; overflow: hidden; background: #fff; font-family: Arial, Helvetica, sans-serif; }
      .card {
        width: 616px;
        height: 382px;
        box-sizing: border-box;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #ffffff;
        padding: 28px;
        color: #1e293b;
      }
      .eyebrow {
        margin: 0 0 4px;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
      }
      h1 {
        margin: 0 0 24px;
        font-size: 26px;
        line-height: 1.15;
        color: #0b162a;
      }
      .big {
        margin: 0;
        text-align: center;
        font-size: 72px;
        line-height: 1;
        font-weight: 700;
        color: #c83803;
      }
      .sub {
        margin: 8px 0 24px;
        text-align: center;
        font-size: 16px;
        color: #64748b;
      }
      .bar {
        height: 34px;
        overflow: hidden;
        border-radius: 10px;
        font-size: 0;
      }
      .yes, .no {
        display: inline-block;
        height: 34px;
        line-height: 34px;
        text-align: center;
        font-size: 14px;
        font-weight: 700;
      }
      .yes { width: 54%; background: #c83803; color: #fff7ed; }
      .no { width: 46%; background: #0b162a; color: #f8fafc; }
      .conf-label {
        margin: 18px 0 10px;
        font-size: 15px;
        font-weight: 700;
        color: #0b162a;
      }
      .grid {
        font-size: 0;
      }
      .box {
        display: inline-block;
        width: 31.5%;
        margin-right: 2.75%;
        box-sizing: border-box;
        border-radius: 14px;
        padding: 14px 10px;
        text-align: center;
      }
      .box:last-child { margin-right: 0; }
      .box p { margin: 0; }
      .box .k { font-size: 13px; color: #64748b; }
      .box .v { margin-top: 4px; font-size: 28px; font-weight: 700; color: #0b162a; }
    </style>
  </head>
  <body>
    <div class="card" data-export-root>
      <p class="eyebrow">The closest call</p>
      <h1>Will the Bears make the playoffs?</h1>
      <p class="big">54%</p>
      <p class="sub">of fans correctly predicted yes</p>

      <div class="bar">
        <div class="yes">Yes 54%</div><div class="no">No 46%</div>
      </div>

      <p class="conf-label">Confidence breakdown</p>
      <div class="grid">
        <div class="box" style="background:#f1f5f9;">
          <p class="k">Low</p>
          <p class="v">27%</p>
        </div>
        <div class="box" style="background:#fff7ed;">
          <p class="k">Medium</p>
          <p class="v">35%</p>
        </div>
        <div class="box" style="background:#e2e8f0;">
          <p class="k">High</p>
          <p class="v">38%</p>
        </div>
      </div>
    </div>
  </body>
</html>
