<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Offense Surprise</title>
    <style>
      html, body { margin: 0; width: 616px; background: #fff; font-family: Arial, Helvetica, sans-serif; }
      .card {
        width: 616px;
        min-height: 280px;
        box-sizing: border-box;
        border: 1px solid #e2e8f0;
        border-radius: 20px;
        background: #fff;
        padding: 28px 24px 30px;
        text-align: center;
        color: #1e293b;
      }
      .eyebrow {
        margin: 0;
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.24em;
        text-transform: uppercase;
        color: #c83803;
      }
      .rank {
        margin: 18px 0 0;
        font-size: 96px;
        line-height: 1;
        font-weight: 900;
        color: #0b162a;
      }
      .sub {
        margin: 8px 0 0;
        font-size: 17px;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: #64748b;
      }
      .ypg {
        margin: 12px 0 0;
        font-size: 28px;
        font-weight: 700;
        color: #334155;
      }
      .note {
        margin: 20px 0 0;
        font-size: 24px;
        line-height: 1.5;
        color: #475569;
      }
      .note strong { color: #c83803; }
    </style>
  </head>
  <body>
    <div class="card" data-export-root>
      <p class="eyebrow">The Offense No One Saw Coming</p>
      <p class="rank">4th</p>
      <p class="sub">In Total Offense</p>
      <p class="ypg">375.7 YPG</p>
      <p class="note">Fans who predicted top 10: <strong>40%</strong></p>
    </div>
  </body>
</html>
