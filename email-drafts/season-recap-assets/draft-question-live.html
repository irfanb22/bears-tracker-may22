<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Live Draft Question Card</title>
    <style>
      html, body { margin: 0; width: 616px; background: #fff; font-family: Arial, Helvetica, sans-serif; }
      .card {
        width: 616px;
        box-sizing: border-box;
        border: 1px solid #dbe4ef;
        border-radius: 24px;
        background: linear-gradient(180deg, #ffffff 0%, #f8fafc 100%);
        padding: 24px;
        color: #0b162a;
      }
      .top {
        overflow: hidden;
      }
      .eyebrow {
        float: left;
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #64748b;
      }
      .status {
        float: right;
        margin: 0;
        padding: 7px 12px;
        border-radius: 999px;
        background: #ecfdf3;
        color: #166534;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      h1 {
        margin: 18px 0 18px;
        font-size: 34px;
        line-height: 1.18;
        color: #0b162a;
      }
      .options {
        margin: 0;
        padding: 0;
        list-style: none;
      }
      .option {
        margin: 0 0 12px;
        padding: 14px 16px;
        border: 1px solid #dbe4ef;
        border-radius: 16px;
        background: #ffffff;
        font-size: 17px;
        line-height: 1.35;
        color: #334155;
      }
      .option:last-child {
        margin-bottom: 0;
      }
      .cta {
        margin-top: 20px;
        display: inline-block;
        padding: 14px 26px;
        border-radius: 999px;
        background: #0b162a;
        color: #ffffff;
        font-size: 16px;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="card" data-export-root>
      <div class="top">
        <p class="eyebrow">Bears Prediction Tracker</p>
        <p class="status">Live now</p>
      </div>
      <h1>Who will the Chicago Bears select with the 25th pick?</h1>
      <ul class="options">
        <li class="option">Defensive Line</li>
        <li class="option">Linebacker</li>
        <li class="option">Secondary</li>
        <li class="option">Offensive Line</li>
        <li class="option">Other</li>
      </ul>
      <div class="cta">Make Prediction</div>
    </div>
  </body>
</html>
