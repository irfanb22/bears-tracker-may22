<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Odunze Stats</title>
    <style>
      body { margin: 0; background: #fff; font-family: Arial, Helvetica, sans-serif; }
      .wrap {
        width: 616px;
        box-sizing: border-box;
        border: 1px solid #e2e8f0;
        border-radius: 24px;
        background: #ffffff;
        overflow: hidden;
        font-size: 0;
      }
      .photo {
        display: inline-block;
        width: 150px;
        height: 250px;
        background: #e2e8f0;
        vertical-align: top;
      }
      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: center;
        display: block;
      }
      .content {
        display: inline-block;
        width: 466px;
        padding: 22px;
        box-sizing: border-box;
        vertical-align: top;
      }
      .card {
        border: 1px solid #e2e8f0;
        border-radius: 18px;
        overflow: hidden;
        background: #f8fafc;
      }
      .head {
        padding: 12px 16px;
        background: #0b162a;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }
      .grid {
        padding: 18px 16px 16px;
        font-size: 0;
      }
      .stat {
        display: inline-block;
        width: 25%;
        vertical-align: top;
      }
      .k {
        margin: 0;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #64748b;
      }
      .v {
        margin: 8px 0 0;
        font-size: 38px;
        line-height: 1;
        font-weight: 900;
        color: #0b162a;
      }
      .v.orange { color: #c83803; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="photo">
        <img src="../../src/assets/OdunRo00_2024.jpg" alt="Rome Odunze" />
      </div>
      <div class="content">
        <div class="card">
          <div class="head">Rome Odunze 2025</div>
          <div class="grid">
            <div class="stat">
              <p class="k">YDS</p>
              <p class="v">661</p>
            </div>
            <div class="stat">
              <p class="k">TD</p>
              <p class="v">6</p>
            </div>
            <div class="stat">
              <p class="k">AVG</p>
              <p class="v">15.0</p>
            </div>
            <div class="stat">
              <p class="k">Games</p>
              <p class="v orange">12</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
